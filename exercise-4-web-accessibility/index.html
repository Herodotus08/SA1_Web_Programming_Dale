<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wondering Photographer - Shop</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="exercise_4_style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-container">
            <h1>The Wondering Photographer</h1>
            
            <button class="cart-btn" aria-label="View shopping basket">
                <!-- Empty alt prevents screen readers from reading this twice -->
                <img src="C:\Users\daled\OneDrive\Documents\GitHub\SA1_web_programming_Dale\exercise-4-web-accessibility\media\shopping.svg" alt="" class="cart-icon"> Cart
            </button>
        </div>
    </header>

    <!-- Main content -->
    <main>
        
        <!-- Photo 1 -->
        <article class="photo-card">
            <img src="media\OceanPhoto.jpg" alt="Snowy ocean at sunset">
            <p>A picture of a beautiful snowy ocean with a beautiful sunset.</p>
            <button class="add-btn" aria-label="Add Snowy ocean with a beautiful sunset photo to basket">Add to basket</button>
        </article>

        <!-- Photo 2 -->
        <article class="photo-card">
            <img src="media\BridgePhoto.jpg" alt="Bridge Photo">
            <p>A picture of a beautiful bridge.</p>
            <button class="add-btn" aria-label="Add Golden Gate Bridge photo to basket">Add to basket</button>
        </article>

        <!-- Photo 3 -->
        <article class="photo-card">
            <img src="media\ValleyPhoto.jpg" alt="A wide river valley">
            <p>A picture of a beautiful river valley.</p>
            <button class="add-btn" aria-label="Add river valley photo to basket">Add to basket</button>
        </article>

        <!-- Photo 4 -->
        <article class="photo-card">
            <img src="media\WaterfallPhoto.jpg" alt="Waterfall image">
            <p>A picture of a huge and beautiful waterfall.</p>
            <button class="add-btn" aria-label="Add waterfall photo to basket">Add to basket</button>
        </article>

    </main>

    <!-- Footer -->
    <footer>
        <p>Copyright The Wondering Dale Densley 2018.</p>
        <nav aria-label="Footer navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">About me</a></li>
            </ul>
        </nav>
    </footer>

</body>
</html>
